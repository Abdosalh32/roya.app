name: roya
description: "Roya Future - Shop Owner Dashboard"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ─── State Management & Navigation ───────
  get: ^4.6.6

  # ─── Networking ──────────────────────────
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # ─── Storage & Security ──────────────────
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # ─── Images ──────────────────────────────
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.3.0

  # ─── Firebase & Notifications ─────────────
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1

  # ─── Localization ─────────────────────────
  flutter_localizations:
    sdk: flutter
  intl: any

  # ─── UI & Responsive ──────────────────────
  flutter_screenutil: ^5.9.3
  shimmer: ^3.0.0
  badges: ^3.1.2
  fl_chart: ^0.69.0
  dotted_border: ^2.1.0

  # ─── PDF & Printing ───────────────────────
  printing: ^5.14.0
  pdf: ^3.11.1

  # ─── Utilities ────────────────────────────
  connectivity_plus: ^6.1.1
  permission_handler: ^11.3.1
  flutter_dotenv: ^5.2.1
  timeago: ^3.7.0
  pull_to_refresh_flutter3: ^2.0.2
  fluttertoast: ^8.2.8
  go_router: ^17.1.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/fonts/
    - .env

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
